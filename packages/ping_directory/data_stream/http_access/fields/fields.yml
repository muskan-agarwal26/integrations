- name: ping_directory.http_access
  type: group
  fields:
    - name: authorization_type
      type: keyword
      description: The authorization type used in the request (e.g. Bearer, Basic).
    - name: redirect_uri
      type: keyword
      description: The URI to which the client was redirected.
    - name: request_header
      type: group
      fields:
        - name: accept
          type: keyword
          description: The Accept request header.
        - name: accept_encoding
          type: keyword
          description: The Accept-Encoding request header.
        - name: accept_language
          type: keyword
          description: The Accept-Language request header.
        - name: cache_control
          type: keyword
          description: The Cache-Control request header.
        - name: connection
          type: keyword
          description: The Connection request header.
        - name: sec_ch_ua
          type: keyword
          description: The sec-ch-ua request header.
        - name: sec_ch_ua_mobile
          type: keyword
          description: The sec-ch-ua-mobile request header.
        - name: sec_ch_ua_platform
          type: keyword
          description: The sec-ch-ua-platform request header.
        - name: sec_fetch_dest
          type: keyword
          description: The Sec-Fetch-Dest request header.
        - name: sec_fetch_mode
          type: keyword
          description: The Sec-Fetch-Mode request header.
        - name: sec_fetch_site
          type: keyword
          description: The Sec-Fetch-Site request header.
        - name: sec_fetch_user
          type: keyword
          description: The Sec-Fetch-User request header.
        - name: upgrade_insecure_requests
          type: keyword
          description: The Upgrade-Insecure-Requests request header.
    - name: response_header
      type: group
      fields:
        - name: connection
          type: keyword
          description: The Connection response header.
        - name: date
          type: keyword
          description: The Date response header.
        - name: request_id
          type: keyword
          description: The Request-Id response header.
        - name: x_frame_options
          type: keyword
          description: The X-Frame-Options response header.
    - name: thread_id
      type: long
      description: ID of the server thread that processed the request.
    - name: type
      type: keyword
      description: Log record type. Always RESULT for HTTP detailed access log entries.
