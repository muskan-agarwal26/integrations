- name: data_stream.dataset
  external: ecs
  description: Dataset name associated with the data stream.
- name: data_stream.namespace
  external: ecs
  description: Namespace used to group related data streams.
- name: data_stream.type
  external: ecs
  description: Type of data stream, such as logs or metrics.
- name: event.dataset
  type: constant_keyword
  external: ecs
  value: ping_directory.ldap_access
  description: Identifies the PingDirectory LDAP access log dataset.
- name: event.module
  type: constant_keyword
  external: ecs
  value: ping_directory
  description: Module that generated the event.
- name: log.source.address
  type: keyword
  description: Source address from which the log event was read / sent from.
- name: '@timestamp'
  external: ecs
  description: Date and time when the event occurred.
