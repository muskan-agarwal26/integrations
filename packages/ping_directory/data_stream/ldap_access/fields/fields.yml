- name: ping_directory
  type: group
  fields:
    - name: ldap_access
      type: group
      fields:
        - name: additional_info
          type: keyword
          description: Additional diagnostic information returned with the extended operation result.
        - name: attrs
          type: text
          description: Requested attributes in the search. Empty means all user attributes returned.
        - name: auth_dn
          type: keyword
          description: Fully-resolved DN of the authenticated user after bind. May differ from bind dn.
        - name: auth_failure_id
          type: keyword
          description: Identifier associated with the authentication failure.
        - name: auth_failure_name
          type: keyword
          description: Human-readable name of the authentication failure condition.
        - name: auth_type
          type: keyword
          description: Authentication mechanism used in the Bind request.
        - name: base
          type: keyword
          description: Base DN of the LDAP search operation.
        - name: client_connection_policy
          type: keyword
          description: Name of the client connection policy applied to this connection.
        - name: client_ip
          type: ip
          description: Client IP value recorded by PingDirectory for the operation.
        - name: client_server_handshake_time_millis
          type: float
          description: Total time in ms for the full client-server TLS handshake.
        - name: code_location
          type: keyword
          description: Internal code location where the operation or event originated.
        - name: conn
          type: long
          description: LDAP connection ID. Each TCP connection from a client gets a unique conn value.
        - name: dn
          type: keyword
          description: DN of the entry that was added or modified in the directory.
        - name: entries_returned
          type: long
          description: Number of LDAP entries returned in the search result.
        - name: filter
          type: keyword
          description: LDAP search filter expression used in the search request.
        - name: matched_dn
          type: keyword
          description: DN that matched the LDAP request during processing.
        - name: message
          type: text
          description: Message text from a DISCONNECT operation.
        - name: msg_id
          type: keyword
          description: LDAP message ID from the protocol request. Used to correlate request/response.
        - name: op
          type: long
          description: Operation number within the connection. Increments per operation on the same conn.
        - name: op_purpose
          type: keyword
          description: Application name, version, and code location that triggered the modify.
        - name: origin
          type: keyword
          description: Origin from which the request was initiated.
        - name: pre_auth_zused_privileges
          type: keyword
          description: Privileges used before authorization checks, such as admin session privileges.
        - name: product
          type: keyword
          description: Product name associated with the operation or certificate information.
        - name: qtime
          type: float
          description: Time in milliseconds the operation waited in the queue before being processed.
        - name: request_controls
          type: keyword
          description: OIDs of LDAP controls attached to the modify request.
        - name: request_id
          type: keyword
          description: Unique identifier assigned to the request.
        - name: request_oid
          type: keyword
          description: OID identifying the specific LDAP extended operation requested.
        - name: request_type
          type: keyword
          description: Human-readable name of the extended operation type derived from the OID.
        - name: requester_dn
          type: keyword
          description: Distinguished Name of the authenticated user making the request.
        - name: requester_ip_string
          type: keyword
          description: Raw value of the client identifier when it is not a valid IP address (e.g. "internal").
        - name: result_code
          type: long
          description: LDAP result code numeric value. 0=Success. See RFC 4511 for full list.
        - name: result_code_name
          type: keyword
          description: Human-readable name of the LDAP result code (e.g., Success, NoSuchObject).
        - name: sasl_mechanism
          type: keyword
          description: SASL authentication mechanism used for the bind operation.
        - name: scope
          type: byte
          description: 'LDAP search scope: 0=baseObject, 1=singleLevel, 2=wholeSubtree.'
        - name: server_only_handshake_time_millis
          type: float
          description: Time in ms for the server-only portion of the TLS handshake.
        - name: session_id
          type: keyword
          description: Identifier associated with the client session.
        - name: startup_id
          type: keyword
          description: Identifier associated with the server startup instance.
        - name: streamed_entries_from_index
          type: keyword
          description: Number of entries streamed directly from an index during search processing.
        - name: thread_id
          type: keyword
          description: ID of the server thread that handled the LDAP operation.
        - name: use_dedicated_thread_pool
          type: boolean
          description: Indicates whether a dedicated thread pool was used to process the operation.
        - name: used_privileges
          type: keyword
          description: Server privileges used to process the operation (e.g., bypass-acl, config-read).
        - name: using_admin_session_worker_thread
          type: boolean
          description: Whether the operation used a dedicated admin session worker thread.
        - name: version
          type: keyword
          description: LDAP protocol version used in the Bind request (always 3 for LDAPv3).
        - name: via_detail
          type: group
          fields:
            - name: app
              type: keyword
              description: Application name extracted from the via field.
            - name: client_ip
              type: ip
              description: Client IP extracted from the via field.
            - name: request_id
              type: keyword
              description: Request ID extracted from the via field.
            - name: session_id
              type: keyword
              description: Session ID extracted from the via field.
