---
description: Pipeline for processing PingDirectory LDAP Access logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.4.0
  - rename:
      field: message
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
  - remove:
      field:
        - message
      tag: remove_message
      if: ctx.event?.original != null
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
  - script:
      lang: painless
      tag: trim_header
      source: >
        if (ctx.event?.original != null &&
            ctx.event.original.startsWith("<")) {
            int idx = ctx.event.original.indexOf('[');
            if (idx > -1) {
            ctx.event.original = ctx.event.original.substring(idx);
            }
        }
  - drop:
      tag: drop_empty_lines
      if: ctx.event?.original == null || ctx.event.original.trim().length() == 0
  - drop:
      tag: drop_non_timestamp_lines
      if: ctx.event?.original != null && !(ctx.event.original.trim() =~ /^\[\d{2}\/[A-Za-z]{3}\/\d{4}:/)
  - grok:
      field: event.original
      tag: extract_event_original
      patterns:
        - '\[%{DATA:ping_directory.ldap_access.timestamp} %{ISO8601_TIMEZONE:ping_directory.ldap_access.timezone}\] %{DATA:ping_directory.ldap_access.operation_type} (?=[a-zA-Z][a-zA-Z0-9]*=)%{GREEDYDATA:ping_directory.ldap_access.kvpairs}'
      if: ctx.event?.original != null
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_parse_ldap_access
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - grok:
      field: ping_directory.ldap_access.kvpairs
      tag: extract_via_field
      if: ctx.ping_directory?.ldap_access?.operation_type == 'SEARCH RESULT'
      patterns:
        - '^(?<ping_directory.ldap_access.kv_prefix>.*)\s+via="(?<ping_directory.ldap_access.via>[^"]+)"\s+(?<ping_directory.ldap_access.kv_suffix>.*)$'
      ignore_failure: true
  - set:
      field: ping_directory.ldap_access.kvpairs_without_via
      tag: rebuild_kvpairs_without_via
      value: '{{{ping_directory.ldap_access.kv_prefix}}} {{{ping_directory.ldap_access.kv_suffix}}}'
      if: ctx.ping_directory?.ldap_access?.via != null
  - grok:
      field: ping_directory.ldap_access.kvpairs
      tag: extract_disconnect_msg
      if: ctx.ping_directory?.ldap_access?.operation_type == 'DISCONNECT'
      patterns:
        - '%{GREEDYDATA:ping_directory.ldap_access.kv_prefix} msg="%{GREEDYDATA:ping_directory.ldap_access.msg}"'
      ignore_failure: true
  - kv:
      field: ping_directory.ldap_access.kv_prefix
      tag: parsing_kv_prefix
      target_field: ping_directory.ldap_access
      if: ctx.ping_directory?.ldap_access?.operation_type == 'DISCONNECT' && ctx.ping_directory?.ldap_access?.kv_prefix != null
      field_split: ' (?=[A-Za-z][A-Za-z0-9]*=)'
      value_split: '='
      trim_value: '"'
      ignore_missing: true
  - kv:
      field: ping_directory.ldap_access.kvpairs
      tag: parsing_kvpairs_disconnect_no_msg
      target_field: ping_directory.ldap_access
      if: ctx.ping_directory?.ldap_access?.operation_type == 'DISCONNECT' && ctx.ping_directory?.ldap_access?.kv_prefix == null
      field_split: ' (?=[A-Za-z][A-Za-z0-9]*=)'
      value_split: '='
      trim_value: '"'
      ignore_missing: true
  - kv:
      field: ping_directory.ldap_access.kvpairs
      tag: parsing_kvpairs
      target_field: ping_directory.ldap_access
      if: ctx.ping_directory?.ldap_access?.operation_type != 'DISCONNECT' && (ctx.ping_directory?.ldap_access?.operation_type != 'SEARCH RESULT' || ctx.ping_directory?.ldap_access?.via == null)
      field_split: ' (?=[A-Za-z][A-Za-z0-9]*=)'
      value_split: '='
      trim_value: '"'
      ignore_missing: true
  - grok:
      field: ping_directory.ldap_access.via
      tag: parse_via_field
      if: ctx.ping_directory?.ldap_access?.via != null && ctx.ping_directory.ldap_access.via != ''
      patterns:
        - "app='%{DATA:ping_directory.ldap_access.via_detail.app}' clientIP='%{DATA:ping_directory.ldap_access.via_detail.client_ip}' sessionID='%{DATA:ping_directory.ldap_access.via_detail.session_id}' requestID='%{DATA:ping_directory.ldap_access.via_detail.request_id}'"
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_parse_via_field
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - kv:
      field: ping_directory.ldap_access.kvpairs_without_via
      tag: parsing_kvpairs_kvpairs_without_via
      target_field: ping_directory.ldap_access
      if: ctx.ping_directory?.ldap_access?.via != null
      field_split: ' (?=[A-Za-z][A-Za-z0-9]*=)'
      value_split: '='
      trim_value: '"'
      ignore_missing: true
  - remove:
      field: ping_directory.ldap_access.kv_prefix
      tag: remove_pingdirectory_kv_prefix
      ignore_missing: true
  - remove:
      field: ping_directory.ldap_access.kv_suffix
      tag: remove_pingdirectory_kv_suffix
      ignore_missing: true
  - remove:
      field: ping_directory.ldap_access.kvpairs_without_via
      tag: remove_pingdirectory_kvpairs_without_via
      ignore_missing: true
  - remove:
      field: ping_directory.ldap_access.via
      tag: remove_pingdirectory_via
      ignore_missing: true
  - remove:
      field: ping_directory.ldap_access.kvpairs
      tag: remove_pingdirectory_kvpairs
      ignore_missing: true
  - script:
      lang: painless
      tag: rename_camel_case_to_snake_case
      description: Convert all camelCase field names in ping_directory.ldap_access to snake_case.
      source: |-
        def ldap = ctx.ping_directory?.ldap_access;
        if (ldap == null) return;
        List keys = new ArrayList(ldap.keySet());
        for (String key : keys) {
          if (key.equals(key.toLowerCase())) continue;
          String snake = "";
          for (int i = 0; i < key.length(); i++) {
            String ch = key.substring(i, i + 1);
            String lower = ch.toLowerCase();
            if (!ch.equals(lower) && i > 0 && key.substring(i - 1, i).equals(key.substring(i - 1, i).toLowerCase())) {
              snake += "_";
            }
            snake += lower;
          }
          if (!snake.equals(key)) {
            def val = ldap.remove(key);
            ldap.put(snake, val);
          }
        }
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_iam_into_event_category
      value: iam
  - append:
      field: event.type
      tag: append_change_into_event_type
      value: change
  - append:
      field: related.user
      tag: append_ldap_access_auth_dn_into_related_user
      if: ctx.ping_directory?.ldap_access?.auth_dn != null
      value: '{{{ping_directory.ldap_access.auth_dn}}}'
      allow_duplicates: false
  - append:
      field: related.user
      tag: append_ldap_access_dn_into_related_user
      if: ctx.ping_directory?.ldap_access?.dn != null
      value: '{{{ping_directory.ldap_access.dn}}}'
      allow_duplicates: false
  - set:
      field: tls.cipher
      tag: set_tls_cipher_from_ldap_access_cipher
      copy_from: ping_directory.ldap_access.cipher
      ignore_empty_value: true
  - convert:
      field: ping_directory.ldap_access.client_server_handshake_time_millis
      tag: convert_clientServerHandshakeTimeMillis_to_float
      if: ctx.ping_directory?.ldap_access?.client_server_handshake_time_millis != ''
      type: float
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_clientServerHandshakeTimeMillis_to_float
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.conn
      tag: convert_conn_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_conn_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.entries_returned
      tag: convert_entriesReturned_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_entriesReturned_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.etime
      tag: convert_etime_to_float
      if: ctx.ping_directory?.ldap_access?.etime != ''
      type: float
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_etime_to_float
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.duration
      tag: set_event_duration_from_ldap_access_etime
      copy_from: ping_directory.ldap_access.etime
      ignore_empty_value: true
  - convert:
      field: ping_directory.ldap_access.from
      tag: convert_from_to_ip
      if: ctx.ping_directory?.ldap_access?.from != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_from_to_ip
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      tag: set_source_ip_from_ldap_access_from
      copy_from: ping_directory.ldap_access.from
      ignore_empty_value: true
  - append:
      field: related.ip
      tag: append_ldap_access_from_into_related_ip
      if: ctx.ping_directory?.ldap_access?.from != null
      value: '{{{ping_directory.ldap_access.from}}}'
      allow_duplicates: false
  - convert:
      field: ping_directory.ldap_access.requester_ip
      tag: convert_requester_ip_to_ip
      type: ip
      ignore_missing: true
      description: Validates/normalizes requester_ip in place; values like "internal" that are not valid IPs are moved to requester_ip_string.
      on_failure:
        - rename:
            field: ping_directory.ldap_access.requester_ip
            tag: rename_requester_ip_to_requester_ip_string
            target_field: ping_directory.ldap_access.requester_ip_string
            ignore_missing: true
  - grok:
      field: ping_directory.ldap_access.requester_ip
      tag: validate_requester_ip
      patterns:
        - '^%{IP:ping_directory.ldap_access.requester_ip_valid}$'
      ignore_missing: true
      ignore_failure: true
  - set:
      field: source.ip
      tag: set_source_ip_from_ldap_access_requester_ip
      copy_from: ping_directory.ldap_access.requester_ip_valid
      ignore_empty_value: true
      override: false
  - append:
      field: related.ip
      tag: append_ldap_access_requester_ip_into_related_ip
      if: ctx.ping_directory?.ldap_access?.requester_ip_valid != null
      value: '{{{ping_directory.ldap_access.requester_ip_valid}}}'
      allow_duplicates: false
  - remove:
      field: ping_directory.ldap_access.requester_ip_valid
      tag: remove_ping_directory_ldap_access_requester_ip_valid_tmp
      ignore_missing: true
  - convert:
      field: ping_directory.ldap_access.from_port
      tag: convert_fromPort_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_fromPort_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.port
      tag: set_source_port_from_ldap_access_from_port
      copy_from: ping_directory.ldap_access.from_port
      ignore_empty_value: true
  - set:
      field: observer.name
      tag: set_observer_name_from_ldap_access_instance_name
      copy_from: ping_directory.ldap_access.instance_name
      ignore_empty_value: true
  - rename:
      field: ping_directory.ldap_access.msg
      tag: rename_msg_to_message
      target_field: ping_directory.ldap_access.message
      ignore_missing: true
  - convert:
      field: ping_directory.ldap_access.msg_id
      tag: convert_msgID_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_msgID_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.msg_id
      tag: convert_msg_id_to_keyword
      type: string
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_msg_id_to_keyword
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.op
      tag: convert_op_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_op_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.qtime
      tag: convert_qtime_to_float
      if: ctx.ping_directory?.ldap_access?.qtime != ''
      type: float
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_qtime_to_float
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.user
      tag: append_ldap_access_requester_dn_into_related_user
      if: ctx.ping_directory?.ldap_access?.requester_dn != null
      value: '{{{ping_directory.ldap_access.requester_dn}}}'
      allow_duplicates: false
  - convert:
      field: ping_directory.ldap_access.result_code
      tag: convert_resultCode_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_resultCode_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.server_only_handshake_time_millis
      tag: convert_serverOnlyHandshakeTimeMillis_to_float
      if: ctx.ping_directory?.ldap_access?.server_only_handshake_time_millis != ''
      type: float
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_serverOnlyHandshakeTimeMillis_to_float
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.thread_id
      tag: convert_threadID_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_threadID_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: ping_directory.ldap_access.thread_id
      tag: convert_thread_id_to_keyword
      if: ctx.ping_directory?.ldap_access?.thread_id != ''
      type: string
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_thread_id_to_keyword
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.timezone
      tag: set_event_timezone_from_ldap_access_timezone
      copy_from: ping_directory.ldap_access.timezone
      ignore_empty_value: true
  - set:
      field: event.timezone
      tag: set_event_timezone_from_tz_offset
      copy_from: _conf.tz_offset
      ignore_empty_value: true
      override: true
  - date:
      field: ping_directory.ldap_access.timestamp
      tag: date_timestamp
      target_field: ping_directory.ldap_access.timestamp
      formats:
        - dd/MMM/yyyy:HH:mm:ss.SSS
      if: ctx.ping_directory?.ldap_access?.timestamp != null && ctx.ping_directory.ldap_access.timestamp != '' && ctx.event?.timezone == null
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_date_timestamp
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: ping_directory.ldap_access.timestamp
      tag: date_timestamp_with_timezone
      target_field: ping_directory.ldap_access.timestamp
      timezone: '{{{event.timezone}}}'
      formats:
        - dd/MMM/yyyy:HH:mm:ss.SSS
      if: ctx.ping_directory?.ldap_access?.timestamp != null && ctx.ping_directory.ldap_access.timestamp != '' && ctx.event?.timezone != null
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_date_timestamp_with_timezone
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_ldap_access_timestamp
      copy_from: ping_directory.ldap_access.timestamp
      ignore_empty_value: true
  - convert:
      field: ping_directory.ldap_access.to
      tag: convert_to_to_ip
      if: ctx.ping_directory?.ldap_access?.to != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_to_to_ip
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.ip
      tag: set_destination_ip_from_ldap_access_to
      copy_from: ping_directory.ldap_access.to
      ignore_empty_value: true
  - append:
      field: related.ip
      tag: append_ldap_access_to_into_related_ip
      if: ctx.ping_directory?.ldap_access?.to != null
      value: '{{{ping_directory.ldap_access.to}}}'
      allow_duplicates: false
  - convert:
      field: ping_directory.ldap_access.to_port
      tag: convert_toPort_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_toPort_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.port
      tag: set_destination_port_from_ldap_access_to_port
      copy_from: ping_directory.ldap_access.to_port
      ignore_empty_value: true
  - set:
      field: event.reason
      tag: set_event_reason_from_ldap_access_disconnect_reason
      copy_from: ping_directory.ldap_access.reason
      ignore_empty_value: true
  - set:
      field: event.reason
      tag: set_event_reason_from_ldap_access_auth_failure_reason
      copy_from: ping_directory.ldap_access.auth_failure_reason
      ignore_empty_value: true
      override : false
  - convert:
      field: ping_directory.ldap_access.use_dedicated_thread_pool
      tag: convert_use_dedicated_thread_pool_to_boolean
      if: ctx.ping_directory?.ldap_access?.use_dedicated_thread_pool != ''
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_use_dedicated_thread_pool_to_boolean
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: trace.id
      tag: set_trace_id_from_correlation_id
      copy_from: ping_directory.ldap_access.correlation_id
      ignore_empty_value: true
  - convert:
      field: ping_directory.ldap_access.via_detail.client_ip
      tag: convert_client_ip_to_ip
      if: ctx.ping_directory?.ldap_access?.via_detail?.client_ip != null
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_via_detail_client_ip_to_ip
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.ip
      tag: append_via_detail_client_ip_into_related_ip
      if: ctx.ping_directory?.ldap_access?.via_detail?.client_ip != null
      value: '{{{ping_directory.ldap_access.via_detail.client_ip}}}'
      allow_duplicates: false
  - set:
      field: event.action
      tag: set_event_action_from_operation_type
      copy_from: ping_directory.ldap_access.operation_type
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      if: ctx.event?.action != null
      ignore_missing: true
  - script:
      lang: painless
      tag: set_event_outcome_from_result_code_name
      if: ctx.ping_directory?.ldap_access?.result_code_name != null
      source: >
        String name = ctx.ping_directory.ldap_access.result_code_name;
        ctx.event.outcome = name.equalsIgnoreCase('Success') ? 'success' : 'failure';
  - set:
      field: network.protocol
      tag: set_network_protocol_from_ldap_access_protocol
      copy_from: ping_directory.ldap_access.protocol
      if: ctx.ping_directory?.ldap_access?.operation_type == 'CONNECT'
      ignore_empty_value: true
  - lowercase:
      field: network.protocol
      tag: lowercase_network_protocol
      if: ctx.network?.protocol != null
      ignore_missing: true
  - set:
      field: tls.version_protocol
      tag: set_protocol_from_tls_protocol
      if: ctx.ping_directory?.ldap_access?.operation_type == 'SECURITY-NEGOTIATION'
      copy_from: ping_directory.ldap_access.protocol
      ignore_empty_value: true
  - lowercase:
      field: tls.version_protocol
      tag: lowercase_tls_version_protocol
      if: ctx.tls?.version_protocol != null
      ignore_missing: true
  - set:
      field: http.request.id
      tag: set_http_request_id
      copy_from: ping_directory.ldap_access.http_request_id
      ignore_empty_value: true
  - remove:
      field:
        - ping_directory.ldap_access.requester_ip
        - ping_directory.ldap_access.cn
        - ping_directory.ldap_access.http_request_id
        - ping_directory.ldap_access.correlation_id
        - ping_directory.ldap_access.auth_failure_reason
        - ping_directory.ldap_access.protocol
        - ping_directory.ldap_access.operation_type
        - ping_directory.ldap_access.cipher
        - ping_directory.ldap_access.reason
        - ping_directory.ldap_access.etime
        - ping_directory.ldap_access.from
        - ping_directory.ldap_access.from_port
        - ping_directory.ldap_access.instance_name
        - ping_directory.ldap_access.msg
        - ping_directory.ldap_access.timestamp
        - ping_directory.ldap_access.timezone
        - ping_directory.ldap_access.to
        - ping_directory.ldap_access.to_port
      tag: remove_fields_mapped_to_ecs
      ignore_missing: true
  - script:
      tag: remove_null_values
      lang: painless
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - append:
      field: tags
      tag: append_preserve_original_event_on_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      tag: append_error_message_on_failure
      value: >-
        Processor {{{_ingest.on_failure_processor_type}}}
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{_ingest.on_failure_processor_tag}}}'
        {{{/_ingest.on_failure_processor_tag}}}
        in pipeline '{{{_ingest.pipeline}}}'
        failed with message '{{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_event_kind_to_pipeline_error
      value: pipeline_error
  - append:
      field: tags
      tag: append_tags
      value: preserve_original_event
      allow_duplicates: false
