type: logs
title: CrowdStrike Falcon events
streams:
  - input: logfile
    enabled: false
    vars:
      - name: paths
        type: text
        title: Paths
        description: Location of the files where event outputs are written. The contents of these files should be in a valid JSON format.
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/crowdstrike/falconhoseclient/output*
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - crowdstrike-falcon
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

    template_path: log.yml.hbs
    title: Falcon events
    description: Collect CrowdStrike Falcon events through Falcon SIEM Connector.
  - input: streaming
    template_path: streaming.yml.hbs
    title: Falcon events
    description: Collect CrowdStrike Falcon events using Event Streams API.
    enabled: false
    vars:
      - name: url
        type: text
        title: URL
        description: Base URL of the CrowdStrike API. Defaults to https://api.crowdstrike.com.
        default: https://api.crowdstrike.com
        required: true
        show_user: true
      - name: token_url
        type: text
        title: Token URL
        description: CrowdStrike API token URL.
        default: https://api.crowdstrike.com/oauth2/token
        required: true
        show_user: false
      - name: client_id
        type: text
        title: Client ID
        description: Client ID for the CrowdStrike API.
        multi: false
        required: true
        show_user: true
      - name: client_secret
        type: password
        title: Client Secret
        description: Client Secret for the CrowdStrike API.
        multi: false
        required: true
        show_user: true
        secret: true
      - name: app_id
        type: text
        title: App ID
        description: This field specifies the `appId` parameter sent to the CrowdStrike API. See the CrowdStrike documentation for details.
        multi: false
        required: true
        show_user: true
      - name: retry_max_attempts
        type: integer
        title: Retry - Maximum Attempts
        description: >-
          The maximum number of times a failed connection to the Event Streams API is retried before the input terminates and needs to be restarted. Failures such as a non-200 response or bad credentials count toward this limit. Enable `Retry - Infinite Retries` to never terminate on repeated failures. On Elastic Agent 8.19.19, 9.3.8, 9.4.4, or later, transient connection-level failures (empty responses, network errors, timeouts) are retried indefinitely and do not count toward this limit; values above 10 (and `Retry - Infinite Retries`) also require those agent versions and are silently capped at 10 on earlier agents.
        multi: false
        required: false
        show_user: true
        default: 5
      - name: retry_infinite_retries
        type: bool
        title: Retry - Infinite Retries
        description: >-
          Retry failed connections indefinitely instead of terminating after the maximum number of attempts is reached. When enabled, `Retry - Maximum Attempts` is ignored. Requires Elastic Agent 8.19.19, 9.3.8, 9.4.4, or later; on earlier agents retries are silently capped at 10.
        multi: false
        required: false
        show_user: true
        default: false
      - name: retry_wait_min
        type: text
        title: Retry - Minimum Wait
        description: >-
          The minimum time to wait before retrying a failed connection, as a duration string (for example `1s` or `500ms`). Must be less than or equal to `Retry - Maximum Wait`.
        multi: false
        required: false
        show_user: false
        default: 1s
      - name: retry_wait_max
        type: text
        title: Retry - Maximum Wait
        description: >-
          The maximum time to wait before retrying a failed connection, as a duration string (for example `30s`). Back-off grows exponentially between the minimum and maximum wait.
        multi: false
        required: false
        show_user: false
        default: 30s
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - crowdstrike-falcon
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

