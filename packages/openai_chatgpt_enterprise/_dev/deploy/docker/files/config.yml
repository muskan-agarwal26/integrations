          `}}
          {{ minify_json `
          {
            "event_id": "cs000000-1111-4a11-8b11-000000000004",
            "type": "CODEX_SECURITY_LOG",
            "timestamp": "2026-07-09T13:00:00.000000Z",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Aaaaaaaaaaaaaaaaaaaaaaa1", "user_email": "alice.martin@example.org" },
            "event_type": "SCAN_FINDING_UPDATED",
