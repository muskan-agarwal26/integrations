rules:
  # =========================================================================
  # PHASE 1 — list log files (paginated). Returns file metadata only; the
  # JSONL content is fetched per-file in phase 2 (see the /logs/{id} rules).
  # =========================================================================

  # --- list page 2 (requested with ?after=2026-07-15T11:00:00Z) ---
  - path: /v1/compliance/workspaces/ws-example-001/logs
    methods: ['GET']
    query_params:
      event_type: AUTH_LOG
      limit: 2
      after: "2026-07-15T11:00:00Z"
    request_headers:
      Authorization:
        - "Bearer xxxx"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "data": [
              {
                "id": "eclf_c3",
                "event_type": "AUTH_LOG",
                "end_time": "2026-07-15T13:49:25Z",
                "file_name": "AUTH_LOG_2026-07-15T13:49:25+00:00.jsonl",
                "file_size": 512,
                "file_sha256": "c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3"
              }
            ],
            "has_more": false,
            "last_end_time": "2026-07-15T14:00:00Z"
          }
          `}}

  # --- list page 1 (initial request; no ?after) ---
  - path: /v1/compliance/workspaces/ws-example-001/logs
    methods: ['GET']
    query_params:
      event_type: AUTH_LOG
      limit: 2
    request_headers:
      Authorization:
        - "Bearer xxxx"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "data": [
              {
                "id": "eclf_a1",
                "event_type": "AUTH_LOG",
                "end_time": "2026-07-15T10:53:24Z",
                "file_name": "AUTH_LOG_2026-07-15T10:53:24+00:00.jsonl",
                "file_size": 1024,
                "file_sha256": "a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1"
              },
              {
                "id": "eclf_b2",
                "event_type": "AUTH_LOG",
                "end_time": "2026-07-15T12:12:23Z",
                "file_name": "AUTH_LOG_2026-07-15T12:12:23+00:00.jsonl",
                "file_size": 768,
                "file_sha256": "b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2"
              }
            ],
            "has_more": true,
            "last_end_time": "2026-07-15T11:00:00Z"
          }
          `}}

  # =========================================================================
  # PHASE 2 — download each log file's JSONL body. The real API 307-redirects
  # to a signed URL; the mock serves the JSON Lines content directly (200).
  # Each line is one AUTH_LOG event and is emitted as a separate document.
  # =========================================================================

  # --- download file eclf_a1 (2 events) ---
  - path: /v1/compliance/workspaces/ws-example-001/logs/eclf_a1
    methods: ['GET']
    request_headers:
      Authorization:
        - "Bearer xxxx"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/x-ndjson'
        body: |-
          {{ minify_json `
          {
            "event_id": "9532e1b4-e44a-42c7-a52a-083c345e0001",
            "type": "AUTH_LOG",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Aaaaaaaaaaaaaaaaaaaaaaa1", "user_email": "alice.martin@example.org" },
            "timestamp": "2026-07-15T10:53:18Z",
            "request_metadata": {
              "client_ip": "81.2.69.142",
              "client_ip_details": { "country": "GB", "city": "London", "region": "England", "region_code": "ENG", "latitude": "51.50853", "longitude": "-0.12574" },
              "client_ja3": "f90ffded875933863a95a1a84285c922",
              "client_ja4": "q13d0311h3_55b375c5d22e_653d80c3fe9d"
            },
            "action_data": { "action": "login_success", "role": "standard-user" }
          }
          `}}
          {{ minify_json `
          {
            "event_id": "09e7362d-56a9-408b-b020-027731110002",
            "type": "AUTH_LOG",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Bbbbbbbbbbbbbbbbbbbbbbb2", "user_email": "bob.singh@example.org" },
            "timestamp": "2026-07-15T10:53:24Z",
            "request_metadata": {
              "client_ip": "89.160.20.112",
              "client_ip_details": { "country": "SE", "city": "Stockholm", "region": "Stockholm County", "region_code": "AB", "asn": "29518", "latitude": "59.32938", "longitude": "18.06871" },
              "client_user_agent": "openid-client/5.4.0 (https://github.com/panva/node-openid-client)",
              "client_ja3": "0b85eb0d4981e69064e40753e4f0ac5f",
              "client_ja4": "t13d301100_1d37bd780c83_8e6e362c5eac"
            },
            "action_data": { "action": "token_issued", "role": "standard-user" }
          }
          `}}

  # --- download file eclf_b2 (1 event) ---
  - path: /v1/compliance/workspaces/ws-example-001/logs/eclf_b2
    methods: ['GET']
    request_headers:
      Authorization:
        - "Bearer xxxx"
    responses:
      - status_code: 200
        headers:
