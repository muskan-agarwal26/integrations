rules:
  # =========================================================================
  # PHASE 1 — list Application Log files (paginated with `after`).
  # The specific page-2 rule (after = page-1 last_end_time) must come first so
  # it wins over the general page-1 rule; page 2 returns an empty page with
  # has_more=false, which terminates collection.
  # =========================================================================

  # --- list page 2 (after cursor from page 1) -> empty, terminates ---
  - path: /v1/compliance/workspaces/ws-example-001/logs
    methods: ['GET']
    query_params:
      event_type: APP_LOG
      after: '2026-07-15T16:02:11.114000Z'
    request_headers:
      Authorization:
        - 'Bearer xxxx'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {"data": [], "has_more": false, "last_end_time": null}

  # --- list page 1 (initial) -> 2 files, has_more true ---
  - path: /v1/compliance/workspaces/ws-example-001/logs
    methods: ['GET']
    query_params:
      event_type: APP_LOG
    request_headers:
      Authorization:
        - 'Bearer xxxx'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {"data": [{"id": "eclf_a1", "event_type": "APP_LOG", "end_time": "2026-07-15T15:39:18.792578Z", "file_name": "APP_LOG_2026-07-15T15:39:18.792578+00:00.jsonl", "file_size": 640, "file_sha256": "a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1"}, {"id": "eclf_b2", "event_type": "APP_LOG", "end_time": "2026-07-15T16:02:11.114000Z", "file_name": "APP_LOG_2026-07-15T16:02:11.114000+00:00.jsonl", "file_size": 512, "file_sha256": "b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2"}], "has_more": true, "last_end_time": "2026-07-15T16:02:11.114000Z"}

  # =========================================================================
  # PHASE 2 — download each log file (JSON Lines, one event per line).
  # =========================================================================

  # --- download file eclf_a1 (2 events) ---
  - path: /v1/compliance/workspaces/ws-example-001/logs/eclf_a1
    methods: ['GET']
    request_headers:
      Authorization:
        - 'Bearer xxxx'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/x-ndjson'
        body: |-
          {{ minify_json `
          {
            "event_id": "3f1a9c02-1111-4a11-8b11-000000000001",
            "type": "APP_LOG",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Aaaaaaaaaaaaaaaaaaaaaaa1", "user_email": "alice.martin@example.org" },
            "timestamp": "2026-07-15T15:39:18.154524Z",
            "app_id": "asdk_app_1111111111111111aaaa",
            "app_name": "Slack",
            "app_type": "MCP",
            "conversation_id": "c-1111-aaaa-2222-bbbb",
            "log_type": "request",
            "input": {
              "query": "in:general after:2026-07-14",
              "limit": 20,
              "include_bots": true,
              "sort": "timestamp",
              "sort_dir": "desc",
              "response_format": "concise",
              "_meta": {
                "openai/userAgent": "ChatGPT/1.2026.183 (Mac OS X 26.5.2; arm64; build 1783607847)",
                "openai/locale": "en-GB",
                "openai/userLocation": { "city": "London", "region": "England", "country": "GB", "timezone": "Europe/London", "latitude": "51.50853", "longitude": "-0.12574" },
                "timezone": "Europe/London",
                "openai/subject": "v1/mock-subject-aaaaaaaaaaaaaaaa",
                "openai/session": "v1/mock-session-aaaaaaaaaaaaaaaa",
                "openai/organization": "v1/mock-org-aaaaaaaaaaaaaaaa"
              }
            }
          }
          `}}
          {{ minify_json `
          {
            "event_id": "3f1a9c02-1111-4a11-8b11-000000000002",
            "type": "APP_LOG",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Aaaaaaaaaaaaaaaaaaaaaaa1", "user_email": "alice.martin@example.org" },
            "timestamp": "2026-07-15T15:39:18.792578Z",
            "app_id": "asdk_app_1111111111111111aaaa",
            "app_name": "Slack",
            "app_type": "MCP",
            "conversation_id": "c-1111-aaaa-2222-bbbb",
            "log_type": "response",
            "output": [
              {
                "response": {
                  "result": { "content": [ { "type": "text", "text": "Search Results for: in:general (20 results)" } ], "isError": false },
                  "connector_id": "asdk_app_1111111111111111aaaa",
                  "connector_name": "Slack",
                  "action_name": "slack_search_public",
                  "is_sync": false,
                  "internal": { "external_call_time_ms": 539 }
                }
              }
            ]
          }
          `}}

  # --- download file eclf_b2 (2 events) ---
  - path: /v1/compliance/workspaces/ws-example-001/logs/eclf_b2
    methods: ['GET']
    request_headers:
      Authorization:
        - 'Bearer xxxx'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/x-ndjson'
        body: |-
          {{ minify_json `
          {
            "event_id": "3f1a9c02-1111-4a11-8b11-000000000003",
            "type": "APP_LOG",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Bbbbbbbbbbbbbbbbbbbbbbb2", "user_email": "bob.singh@example.org" },
            "timestamp": "2026-07-15T16:02:10.331000Z",
            "app_id": "conn-2222bbbb",
            "app_name": "gdrive",
            "app_type": "SERVICE",
            "conversation_id": "c-2222-bbbb-3333-cccc",
            "log_type": "request",
            "input": { "query": "List recent architecture decisions" }
          }
          `}}
          {{ minify_json `
          {
            "event_id": "3f1a9c02-1111-4a11-8b11-000000000004",
            "type": "APP_LOG",
            "principal": { "id": "11111111-2222-3333-4444-555555555555", "type": "CHATGPT_WORKSPACE" },
            "actor": { "type": "ACCOUNT_USER", "user_id": "user-Bbbbbbbbbbbbbbbbbbbbbbb2", "user_email": "bob.singh@example.org" },
            "timestamp": "2026-07-15T16:02:11.114000Z",
            "app_id": "conn-2222bbbb",
            "app_name": "gdrive",
            "app_type": "SERVICE",
            "conversation_id": "c-2222-bbbb-3333-cccc",
            "log_type": "response",
            "output": [
              {
                "response": {
                  "result": { "content": [ { "type": "text", "text": "Found 3 documents." } ], "isError": false },
                  "connector_id": "conn-2222bbbb",
                  "connector_name": "gdrive",
                  "action_name": "gdrive_search",
                  "is_sync": true,
                  "internal": { "external_call_time_ms": 212 }
                }
              }
            ]
          }
          `}}
