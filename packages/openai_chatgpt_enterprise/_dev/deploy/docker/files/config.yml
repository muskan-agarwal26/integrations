                "owner_id": "user-Aaaaaaaaaaaaaaaaaaaaaaa1",
                "workspace_id": "11111111-2222-3333-4444-555555555555",
                "repo_id": "repo-mock-9",
                "repo_url": "https://github.com/example-org/example-repo",
                "environment_id": "env-mock-123",
                "state": "active",
