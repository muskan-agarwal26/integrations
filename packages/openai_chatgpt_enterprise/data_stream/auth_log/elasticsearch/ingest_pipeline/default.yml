---
description: Parse OpenAI ChatGPT Enterprise Authentication Logs events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: openai_chatgpt_enterprise.auth_log
      tag: parse_json
      if: ctx.event?.original != null
  - fingerprint:
      fields:
        - openai_chatgpt_enterprise.auth_log.event_id
      target_field: _id
      ignore_missing: true
      tag: fingerprint_event_id
  - set:
      field: gen_ai.system
      tag: set_gen_ai_system
      value: openai
  - set:
      field: event.id
      tag: set_event_id
      copy_from: openai_chatgpt_enterprise.auth_log.event_id
      ignore_empty_value: true
  - date:
      field: openai_chatgpt_enterprise.auth_log.timestamp
      target_field: openai_chatgpt_enterprise.auth_log.timestamp
      formats:
        - ISO8601
      tag: date_timestamp
      if: ctx.openai_chatgpt_enterprise?.auth_log?.timestamp != null && ctx.openai_chatgpt_enterprise.auth_log.timestamp != ''
      on_failure:
        - remove:
            field: openai_chatgpt_enterprise.auth_log.timestamp
            ignore_missing: true
            tag: remove_timestamp_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_timestamp
      copy_from: openai_chatgpt_enterprise.auth_log.timestamp
      ignore_empty_value: true
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - set:
      field: user.id
      tag: set_user_id_from_actor
      copy_from: openai_chatgpt_enterprise.auth_log.actor.user_id
      ignore_empty_value: true
  - set:
      field: user.email
      tag: set_user_email_from_actor
      copy_from: openai_chatgpt_enterprise.auth_log.actor.user_email
      ignore_empty_value: true
  - dissect:
      field: user.email
      pattern: '%{}@%{user.domain}'
      tag: dissect_user_domain_from_email
      if: ctx.user?.email != null && ctx.user.email.contains('@')
  - set:
      field: organization.id
      tag: set_organization_id_from_principal
      copy_from: openai_chatgpt_enterprise.auth_log.principal.id
      ignore_empty_value: true
      if: ctx.openai_chatgpt_enterprise?.auth_log?.principal?.id != null
  - convert:
      field: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip
      tag: convert_client_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.openai_chatgpt_enterprise?.auth_log?.request_metadata?.client_ip != ''
      on_failure:
        - remove:
            field: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip
            ignore_missing: true
            tag: remove_client_ip_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      tag: set_source_ip_from_request_metadata
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip
      ignore_empty_value: true
  - set:
      field: source.geo.country_iso_code
      tag: set_source_geo_country
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.country
      ignore_empty_value: true
  - set:
      field: source.geo.city_name
      tag: set_source_geo_city
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.city
      ignore_empty_value: true
  - set:
      field: source.geo.region_name
      tag: set_source_geo_region_name
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.region
      ignore_empty_value: true
  - set:
      field: source.geo.region_iso_code
      tag: set_source_geo_region_iso_code
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.region_code
      ignore_empty_value: true
  - set:
      field: source.geo.location
      tag: set_source_geo_location
      value: '{{{openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.latitude}}},{{{openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.longitude}}}'
      if: >-
        ctx.openai_chatgpt_enterprise?.auth_log?.request_metadata?.client_ip_details?.latitude != null
        && ctx.openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.latitude != ''
        && ctx.openai_chatgpt_enterprise?.auth_log?.request_metadata?.client_ip_details?.longitude != null
        && ctx.openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.longitude != ''
  - convert:
      field: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.asn
      tag: convert_source_asn
      type: long
      ignore_missing: true
      if: ctx.openai_chatgpt_enterprise?.auth_log?.request_metadata?.client_ip_details?.asn != ''
      on_failure:
        - remove:
            field: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.asn
            ignore_missing: true
            tag: remove_asn_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.as.number
      tag: set_source_as_number
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details.asn
      ignore_empty_value: true
  - set:
      field: user_agent.original
      tag: set_user_agent_original
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_user_agent
      ignore_empty_value: true
  - user_agent:
      field: user_agent.original
      ignore_missing: true
      tag: enrich_user_agent
  - set:
      field: tls.client.ja3
      tag: set_tls_client_ja3
      copy_from: openai_chatgpt_enterprise.auth_log.request_metadata.client_ja3
      ignore_empty_value: true
  - set:
      field: event.action
      tag: set_event_action
      copy_from: openai_chatgpt_enterprise.auth_log.action_data.action
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - set:
      field: event.outcome
      tag: set_event_outcome_failure
      value: failure
      if: ctx.event?.action != null && ctx.event.action.contains('fail')
  - set:
      field: event.outcome
      tag: set_event_outcome_success
      value: success
      if: ctx.event?.action != null && !ctx.event.action.contains('fail')
  - append:
      field: event.category
      tag: append_event_category_auth_log
      value: authentication
  - append:
      field: event.type
      tag: append_event_type_auth_log
      value: info
  - append:
      field: related.ip
      tag: append_source_ip_to_related
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null
  - append:
      field: related.user
      tag: append_user_email_to_related
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_user_id_to_related
      value: '{{{user.id}}}'
      allow_duplicates: false
      if: ctx.user?.id != null
  - remove:
      field:
        - openai_chatgpt_enterprise.auth_log.event_id
        - openai_chatgpt_enterprise.auth_log.timestamp
        - openai_chatgpt_enterprise.auth_log.actor.user_id
        - openai_chatgpt_enterprise.auth_log.actor.user_email
        - openai_chatgpt_enterprise.auth_log.principal.id
        - openai_chatgpt_enterprise.auth_log.request_metadata.client_ip
        - openai_chatgpt_enterprise.auth_log.request_metadata.client_ip_details
        - openai_chatgpt_enterprise.auth_log.request_metadata.client_user_agent
        - openai_chatgpt_enterprise.auth_log.request_metadata.client_ja3
        - openai_chatgpt_enterprise.auth_log.action_data.action
      tag: remove_custom_fields_mapped_to_ecs
      ignore_missing: true
      description: Remove custom fields that were copied to ECS fields.
  - script:
      lang: painless
      tag: remove_null_values
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - append:
      field: tags
      tag: append_preserve_on_collector_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
