- name: openai_chatgpt_enterprise.auth_log
  type: group
  description: OpenAI ChatGPT Enterprise Authentication Logs event fields.
  fields:
    - name: action_data
      type: group
      fields:
        - name: role
          type: keyword
          description: Role of the acting user at the time of the authentication event (e.g. standard-user).
    - name: actor
      type: group
      fields:
        - name: type
          type: keyword
          description: Type of actor that performed the action (e.g. ACCOUNT_USER, API_KEY).
    - name: principal
      type: group
      fields:
        - name: type
          type: keyword
          description: Principal that owns the event (e.g. CHATGPT_WORKSPACE).
    - name: request_metadata
      type: group
      fields:
        - name: client_ja4
          type: keyword
          description: JA4 TLS client fingerprint captured at request time.
    - name: type
      type: keyword
      description: Top-level event category (e.g. AUTH_LOG).
