- name: openai_chatgpt_enterprise.app_auth_log
  type: group
  description: OpenAI ChatGPT Enterprise Application Authentication Logs event fields.
  fields:
    - name: actor
      type: group
      fields:
        - name: type
          type: keyword
          description: Type of actor that performed the action (e.g. ACCOUNT_USER, API_KEY).
    - name: app_id
      type: keyword
      description: Identifier of the connected app / connector.
    - name: link_id
      type: keyword
      description: Identifier of the app connection (link) that was linked/unlinked.
    - name: principal
      type: group
      fields:
        - name: type
          type: keyword
          description: Principal that owns the event (e.g. CHATGPT_WORKSPACE).
    - name: type
      type: keyword
      description: Top-level event category (e.g. APP_AUTH_LOG).
