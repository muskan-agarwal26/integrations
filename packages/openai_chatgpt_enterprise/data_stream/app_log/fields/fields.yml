- name: openai_chatgpt_enterprise.app_log
  type: group
  description: OpenAI ChatGPT Enterprise Application Logs event fields.
  fields:
    - name: actor
      type: group
      fields:
        - name: type
          type: keyword
          description: Type of actor that performed the action (e.g. ACCOUNT_USER, API_KEY).
    - name: app_id
      type: keyword
      description: Identifier of the connected app / connector.
    - name: app_name
      type: keyword
      description: Friendly name of the app / connector.
    - name: app_type
      type: keyword
      description: App backend type (e.g. SERVICE, MCP, FIRST_PARTY_ECOSYSTEM, OPEN_API).
    - name: conversation_id
      type: keyword
      description: Conversation in which the app was invoked.
    - name: input
      type: flattened
      description: Raw, free-form request input arguments sent to the app.
    - name: log_type
      type: keyword
      description: APP_LOG sub-type (request or response).
    - name: meta
      type: group
      description: Client context captured with the request in the app input metadata.
      fields:
        - name: locale
          type: keyword
          description: Locale of the client that issued the request.
        - name: organization
          type: keyword
          description: Opaque organization identifier of the client that issued the request.
        - name: session
          type: keyword
          description: Opaque session identifier of the client that issued the request.
        - name: subject
          type: keyword
          description: Opaque subject identifier of the client that issued the request.
        - name: timezone
          type: keyword
          description: Timezone reported by the client that issued the request.
    - name: output
      type: flattened
      description: Raw, free-form response output returned by the app.
    - name: principal
      type: group
      fields:
        - name: type
          type: keyword
          description: Principal that owns the event (e.g. CHATGPT_WORKSPACE).
    - name: query
      type: keyword
      description: Query/input sent to the app on a request log.
    - name: type
      type: keyword
      description: Top-level event category (e.g. APP_LOG).
