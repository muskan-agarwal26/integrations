---
description: Parse OpenAI ChatGPT Enterprise Custom Agents Logs events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: >-
        Renames the original `message` field to `event.original` to store a copy of the original message.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: openai_chatgpt_enterprise.custom_agents_log
      tag: parse_json
      if: ctx.event?.original != null
  - fingerprint:
      fields:
        - openai_chatgpt_enterprise.custom_agents_log.event_id
      target_field: _id
      ignore_missing: true
      tag: fingerprint_event_id
  - set:
      field: gen_ai.system
      tag: set_gen_ai_system
      value: openai
  - set:
      field: event.id
      tag: set_event_id
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_id
      ignore_empty_value: true
  - date:
      field: openai_chatgpt_enterprise.custom_agents_log.timestamp
      target_field: openai_chatgpt_enterprise.custom_agents_log.timestamp
      formats:
        - ISO8601
      tag: date_timestamp
      if: ctx.openai_chatgpt_enterprise.custom_agents_log?.timestamp != null && ctx.openai_chatgpt_enterprise.custom_agents_log.timestamp != ''
      on_failure:
        - remove:
            field: openai_chatgpt_enterprise.custom_agents_log.timestamp
            ignore_missing: true
            tag: remove_timestamp_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_timestamp
      copy_from: openai_chatgpt_enterprise.custom_agents_log.timestamp
      ignore_empty_value: true
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - set:
      field: user.id
      tag: set_user_id_from_actor
      copy_from: openai_chatgpt_enterprise.custom_agents_log.actor.user_id
      ignore_empty_value: true
  - set:
      field: user.email
      tag: set_user_email_from_actor
      copy_from: openai_chatgpt_enterprise.custom_agents_log.actor.user_email
      ignore_empty_value: true
  - set:
      field: user.id
      tag: set_user_id_from_delegator
      copy_from: openai_chatgpt_enterprise.custom_agents_log.actor.agent_runtime.delegator.user_id
      ignore_empty_value: true
      if: ctx.user?.id == null
  - set:
      field: user.email
      tag: set_user_email_from_delegator
      copy_from: openai_chatgpt_enterprise.custom_agents_log.actor.agent_runtime.delegator.user_email
      ignore_empty_value: true
      if: ctx.user?.email == null
  - dissect:
      field: user.email
      pattern: '%{}@%{user.domain}'
      tag: dissect_user_domain_from_email
      if: ctx.user?.email != null && ctx.user.email.contains('@')
  - set:
      field: organization.id
      tag: set_organization_id_from_principal
      copy_from: openai_chatgpt_enterprise.custom_agents_log.principal.id
      ignore_empty_value: true
      if: ctx.openai_chatgpt_enterprise.custom_agents_log?.principal?.id != null
  - convert:
      field: openai_chatgpt_enterprise.custom_agents_log.request_metadata.client_ip
      tag: convert_client_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.openai_chatgpt_enterprise.custom_agents_log?.request_metadata?.client_ip != ''
      on_failure:
        - remove:
            field: openai_chatgpt_enterprise.custom_agents_log.request_metadata.client_ip
            ignore_missing: true
            tag: remove_client_ip_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      tag: set_source_ip_from_request_metadata
      copy_from: openai_chatgpt_enterprise.custom_agents_log.request_metadata.client_ip
      ignore_empty_value: true
  - set:
      field: user_agent.original
      tag: set_user_agent_original
      copy_from: openai_chatgpt_enterprise.custom_agents_log.request_metadata.client_user_agent
      ignore_empty_value: true
  - set:
      field: event.action
      tag: set_event_action
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_type
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - append:
      field: event.category
      tag: append_event_category_custom_agents_log
      value: api
  - append:
      field: event.type
      tag: append_event_type_custom_agents_log
      value: info
  - set:
      field: gen_ai.agent.id
      tag: set_gen_ai_agent_id_from_agent_id
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.agent_id
      ignore_empty_value: true
  - set:
      field: gen_ai.agent.name
      tag: set_gen_ai_agent_name_from_agent_fields_name
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.agent_fields.name
      ignore_empty_value: true
  - set:
      field: gen_ai.agent.description
      tag: set_gen_ai_agent_description
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.agent_fields.description
      ignore_empty_value: true
  - set:
      field: gen_ai.request.model
      tag: set_gen_ai_request_model
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.agent_fields.model_spec.name
      ignore_empty_value: true
  - set:
      field: gen_ai.tool.name
      tag: set_gen_ai_tool_name_from_connector_name
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.connector_name
      ignore_empty_value: true
  - set:
      field: gen_ai.tool.call.id
      tag: set_gen_ai_tool_call_id
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.tool_call_id
      ignore_empty_value: true
  - set:
      field: event.reason
      tag: set_event_reason_from_delete_reason
      copy_from: openai_chatgpt_enterprise.custom_agents_log.event_details.delete_reason
      ignore_empty_value: true
  - script:
      lang: painless
      tag: set_event_outcome
      description: Normalize CUSTOM_AGENTS_LOG run/connector status into event.outcome.
      if: ctx.openai_chatgpt_enterprise.custom_agents_log?.event_type != null
      source: |-
        def et = ctx.openai_chatgpt_enterprise.custom_agents_log.event_type;
        def st = ctx.openai_chatgpt_enterprise.custom_agents_log?.event_details?.status;
        if (et == 'AGENT_RUN_FAILED') {
          ctx.event.outcome = 'failure';
        } else if (et == 'AGENT_RUN_COMPLETED') {
          ctx.event.outcome = 'success';
        } else if (st == 'success') {
          ctx.event.outcome = 'success';
        } else if (st == 'failed') {
          ctx.event.outcome = 'failure';
        }
  - user_agent:
      field: user_agent.original
      ignore_missing: true
      tag: enrich_user_agent
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
      tag: enrich_source_geo
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      tag: enrich_source_asn
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
      tag: rename_source_asn
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
      tag: rename_source_as_org
  - append:
      field: related.ip
      tag: append_source_ip_to_related
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null
  - append:
      field: related.user
      tag: append_user_email_to_related
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_user_id_to_related
      value: '{{{user.id}}}'
      allow_duplicates: false
      if: ctx.user?.id != null
  - remove:
      field:
        - openai_chatgpt_enterprise.custom_agents_log.event_id
        - openai_chatgpt_enterprise.custom_agents_log.timestamp
        - openai_chatgpt_enterprise.custom_agents_log.actor.user_id
        - openai_chatgpt_enterprise.custom_agents_log.actor.user_email
        - openai_chatgpt_enterprise.custom_agents_log.actor.agent_runtime.delegator.user_id
        - openai_chatgpt_enterprise.custom_agents_log.actor.agent_runtime.delegator.user_email
        - openai_chatgpt_enterprise.custom_agents_log.principal.id
        - openai_chatgpt_enterprise.custom_agents_log.request_metadata.client_ip
        - openai_chatgpt_enterprise.custom_agents_log.request_metadata.client_user_agent
        - openai_chatgpt_enterprise.custom_agents_log.event_type
        - openai_chatgpt_enterprise.custom_agents_log.event_details.agent_id
        - openai_chatgpt_enterprise.custom_agents_log.event_details.agent_fields.name
        - openai_chatgpt_enterprise.custom_agents_log.event_details.agent_fields.description
        - openai_chatgpt_enterprise.custom_agents_log.event_details.agent_fields.model_spec.name
        - openai_chatgpt_enterprise.custom_agents_log.event_details.connector_name
        - openai_chatgpt_enterprise.custom_agents_log.event_details.tool_call_id
        - openai_chatgpt_enterprise.custom_agents_log.event_details.delete_reason
        - openai_chatgpt_enterprise.custom_agents_log.event_details.status
      tag: remove_custom_fields_mapped_to_ecs
      ignore_missing: true
      description: Remove custom fields that were copied to ECS fields.
  - script:
      lang: painless
      tag: remove_null_values
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - append:
      field: tags
      tag: append_preserve_on_collector_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
