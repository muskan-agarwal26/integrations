wait_for_data_timeout: 1m
input: cel
service: openai
vars:
  url: http://{{Hostname}}:{{Port}}
  admin_token: xxxx
data_stream:
  vars:
    scope: workspace
    resource_id: ws-example-001
    event_types:
      - AUTH_LOG
    interval: 2s
    batch_size: 2
    initial_interval: 24h
    preserve_original_event: true
assert:
  hit_count: 4
