---
description: Handle OpenAI Compliance APP_AUTH_LOG events (connector link/unlink actions).
processors:
  - append:
      field: event.category
      tag: append_event_category_app_auth_log
      value: configuration
  - append:
      field: event.type
      tag: append_event_type_app_auth_log
      value: change
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
