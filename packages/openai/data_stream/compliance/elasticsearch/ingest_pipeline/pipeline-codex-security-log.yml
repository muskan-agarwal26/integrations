---
description: Handle OpenAI Compliance CODEX_SECURITY_LOG events (Codex security scans and findings).
processors:
  - append:
      field: event.category
      tag: append_event_category_codex_security_log
      value: vulnerability
  - append:
      field: event.type
      tag: append_event_type_codex_security_log
      value: info
  - set:
      field: vulnerability.id
      tag: set_vulnerability_id_from_finding_id
      copy_from: openai.compliance.event_details.finding_id
      ignore_empty_value: true
  - set:
      field: vulnerability.severity
      tag: set_vulnerability_severity_from_criticality
      copy_from: openai.compliance.event_details.updated_fields.criticality
      ignore_empty_value: true
  - set:
      field: url.full
      tag: set_url_full_from_pr_url
      copy_from: openai.compliance.event_details.pr_url
      ignore_empty_value: true
  - convert:
      field: openai.compliance.event_details.scan_configuration_fields.lookback_days
      type: long
      ignore_missing: true
      tag: convert_event_details_scan_configuration_fields_lookback_days
      if: ctx.openai?.compliance?.event_details?.scan_configuration_fields?.lookback_days != ''
      on_failure:
        - remove:
            field: openai.compliance.event_details.scan_configuration_fields.lookback_days
            ignore_missing: true
            tag: remove_event_details_scan_configuration_fields_lookback_days_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: openai.compliance.event_details.scan_configuration_fields.notification_rules_created_count
      type: long
      ignore_missing: true
      tag: convert_event_details_scan_configuration_fields_notification_rules_created_count
      if: ctx.openai?.compliance?.event_details?.scan_configuration_fields?.notification_rules_created_count != ''
      on_failure:
        - remove:
            field: openai.compliance.event_details.scan_configuration_fields.notification_rules_created_count
            ignore_missing: true
            tag: remove_event_details_scan_configuration_fields_notification_rules_created_count_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: openai.compliance.event_details.scan_configuration_fields.notification_rules_deleted_count
      type: long
      ignore_missing: true
      tag: convert_event_details_scan_configuration_fields_notification_rules_deleted_count
      if: ctx.openai?.compliance?.event_details?.scan_configuration_fields?.notification_rules_deleted_count != ''
      on_failure:
        - remove:
            field: openai.compliance.event_details.scan_configuration_fields.notification_rules_deleted_count
            ignore_missing: true
            tag: remove_event_details_scan_configuration_fields_notification_rules_deleted_count_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: openai.compliance.event_details.scan_configuration_fields.notification_rules_updated_count
      type: long
      ignore_missing: true
      tag: convert_event_details_scan_configuration_fields_notification_rules_updated_count
      if: ctx.openai?.compliance?.event_details?.scan_configuration_fields?.notification_rules_updated_count != ''
      on_failure:
        - remove:
            field: openai.compliance.event_details.scan_configuration_fields.notification_rules_updated_count
            ignore_missing: true
            tag: remove_event_details_scan_configuration_fields_notification_rules_updated_count_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: openai.compliance.event_details.updated_fields.lookback_days
      type: long
      ignore_missing: true
      tag: convert_event_details_updated_fields_lookback_days
      if: ctx.openai?.compliance?.event_details?.updated_fields?.lookback_days != ''
