        - remove:
            field: openai.compliance.event_details.updated_fields.lookback_days
            ignore_missing: true
            tag: remove_event_details_updated_fields_lookback_days_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: openai.compliance.event_details.updated_fields.notification_rules_created_count
      type: long
      ignore_missing: true
      tag: convert_event_details_updated_fields_notification_rules_created_count
      if: ctx.openai?.compliance?.event_details?.updated_fields?.notification_rules_created_count != ''
      on_failure:
