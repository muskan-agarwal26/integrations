---
description: Parse OpenAI Compliance Logs Platform events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: >-
        Renames the original `message` field to `event.original` to store a copy of the original message.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: openai.compliance
      tag: parse_json
      if: ctx.event?.original != null
  - fingerprint:
      fields:
        - openai.compliance.event_id
      target_field: _id
      ignore_missing: true
      tag: fingerprint_event_id
  - set:
      field: event.id
      tag: set_event_id
      copy_from: openai.compliance.event_id
      ignore_empty_value: true
  - date:
      field: openai.compliance.timestamp
      target_field: openai.compliance.timestamp
      formats:
        - ISO8601
      tag: date_timestamp
      if: ctx.openai?.compliance?.timestamp != null && ctx.openai.compliance.timestamp != ''
      on_failure:
        - remove:
            field: openai.compliance.timestamp
            ignore_missing: true
            tag: remove_timestamp_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_timestamp
      copy_from: openai.compliance.timestamp
      ignore_empty_value: true
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - set:
      field: user.id
      tag: set_user_id_from_actor
      copy_from: openai.compliance.actor.user_id
      ignore_empty_value: true
  - set:
      field: user.email
      tag: set_user_email_from_actor
      copy_from: openai.compliance.actor.user_email
      ignore_empty_value: true
  - dissect:
      field: user.email
      pattern: '%{}@%{user.domain}'
      tag: dissect_user_domain_from_email
      ignore_missing: true
      if: ctx.user?.email != null && ctx.user.email.contains('@')
  - set:
      field: organization.id
      tag: set_organization_id_from_principal
      copy_from: openai.compliance.principal.id
      ignore_empty_value: true
      if: ctx.openai?.compliance?.principal?.id != null
  - convert:
      field: openai.compliance.request_metadata.client_ip
      tag: convert_client_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.openai?.compliance?.request_metadata?.client_ip != ''
      on_failure:
        - remove:
            field: openai.compliance.request_metadata.client_ip
            ignore_missing: true
            tag: remove_client_ip_on_failure
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      tag: set_source_ip_from_request_metadata
      copy_from: openai.compliance.request_metadata.client_ip
      ignore_empty_value: true
  - set:
      field: user_agent.original
      tag: set_user_agent_original
      copy_from: openai.compliance.request_metadata.client_user_agent
      ignore_empty_value: true
  - set:
      field: tls.client.ja3
      tag: set_tls_client_ja3
      copy_from: openai.compliance.request_metadata.client_ja3
      ignore_empty_value: true
  - set:
      field: destination.domain
      tag: set_destination_domain
      copy_from: openai.compliance.request_metadata.destination_hostname
      ignore_empty_value: true
  - script:
      lang: painless
      tag: set_event_action
      description: Derive event.action from the event-type-specific sub-action field.
      if: ctx.openai?.compliance != null
      source: |-
        def c = ctx.openai.compliance;
        def action = null;
        if (c['type'] == 'AUTH_LOG' && c['action_data'] instanceof Map && c['action_data']['action'] != null) {
          action = c['action_data']['action'];
        } else if (c['action'] != null) {
          action = c['action'];
        } else if (c['event_type'] != null) {
          action = c['event_type'];
        }
        if (action != null) {
          ctx.event.action = action instanceof String ? action : String.valueOf(action);
        }
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - pipeline:
      name: '{{ IngestPipeline "pipeline-app-log" }}'
      if: ctx.openai?.compliance?.type == 'APP_LOG'
      tag: pipeline_app_log
      description: Handle APP_LOG events.
  - pipeline:
      name: '{{ IngestPipeline "pipeline-app-auth-log" }}'
      if: ctx.openai?.compliance?.type == 'APP_AUTH_LOG'
      tag: pipeline_app_auth_log
      description: Handle APP_AUTH_LOG events.
  - pipeline:
      name: '{{ IngestPipeline "pipeline-audit-log" }}'
      if: ctx.openai?.compliance?.type == 'AUDIT_LOG'
      tag: pipeline_audit_log
      description: Handle AUDIT_LOG events.
  - pipeline:
      name: '{{ IngestPipeline "pipeline-auth-log" }}'
      if: ctx.openai?.compliance?.type == 'AUTH_LOG'
      tag: pipeline_auth_log
      description: Handle AUTH_LOG events.
  - pipeline:
      name: '{{ IngestPipeline "pipeline-codex-log" }}'
      if: ctx.openai?.compliance?.type == 'CODEX_LOG'
      tag: pipeline_codex_log
      description: Handle CODEX_LOG events.
  - pipeline:
      name: '{{ IngestPipeline "pipeline-codex-security-log" }}'
      if: ctx.openai?.compliance?.type == 'CODEX_SECURITY_LOG'
      tag: pipeline_codex_security_log
      description: Handle CODEX_SECURITY_LOG events.
  - user_agent:
      field: user_agent.original
      ignore_missing: true
      if: ctx.user_agent?.original != null
      tag: enrich_user_agent
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
      if: ctx.source?.ip != null
      tag: enrich_source_geo
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      if: ctx.source?.ip != null
      tag: enrich_source_asn
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
      tag: rename_source_asn
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
      tag: rename_source_as_org
  - append:
      field: related.ip
      tag: append_source_ip_to_related
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null
  - append:
      field: related.user
      tag: append_user_email_to_related
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_user_id_to_related
      value: '{{{user.id}}}'
      allow_duplicates: false
      if: ctx.user?.id != null
  - remove:
      field:
        - openai.compliance.event_id
        - openai.compliance.timestamp
        - openai.compliance.actor.user_id
        - openai.compliance.actor.user_email
        - openai.compliance.principal.id
        - openai.compliance.request_metadata.client_ip
        - openai.compliance.request_metadata.client_user_agent
        - openai.compliance.request_metadata.client_ja3
        - openai.compliance.request_metadata.destination_hostname
        - openai.compliance.action
        - openai.compliance.action_data.action
        - openai.compliance.event_type
      tag: remove_custom_fields_mapped_to_ecs
      ignore_missing: true
      description: Remove custom fields that were copied to ECS fields.
  - script:
      lang: painless
      tag: remove_null_values
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - append:
      field: tags
      tag: append_preserve_on_collector_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
