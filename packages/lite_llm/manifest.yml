      - type: cel
        title: Collect LiteLLM audit logs via API (CEL polling)
        description: Collect LiteLLM audit logs by polling the LiteLLM proxy /audit REST API directly with the CEL input.
        vars:
          - name: url
            type: text
            title: LiteLLM API URL
            description: URL of the LiteLLM API endpoint (e.g., https://api.example.com).
            multi: false
            required: true
            show_user: true
            secret: false
          - name: api_key
            type: password
            title: LiteLLM API Key
            description: API key for authenticating with the LiteLLM API.
            multi: false
            required: true
            show_user: true
            secret: true
          - name: proxy_url
            type: text
            title: Proxy URL
            description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>. Please ensure your username and password are in URL encoded format.
            multi: false
            required: false
            show_user: false
            secret: false
