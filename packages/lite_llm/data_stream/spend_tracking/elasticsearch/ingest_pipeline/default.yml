---
description: Pipeline for processing spend_tracking logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.4.0
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - remove:
      field:
        - organization
        - division
        - team
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      ignore_missing: true
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
  - rename:
      field: message
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
  - remove:
      field:
        - message
      tag: remove_message
      if: ctx.event?.original != null
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
  - json:
      field: event.original
      tag: json_event_original
      target_field: lite_llm.spend_tracking
  - fingerprint:
      tag: fingerprint_with_id
      fields:
        - lite_llm.spend_tracking.request_id
      target_field: _id
      ignore_missing: true
  - script:
      description: >
        Convert field names from camelCase to snake_case recursively.
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      source: |-
        String camelToSnake(String str) {
            def result = "";
            for (int i = 0; i < str.length(); i++) {
                char c = str.charAt(i);
                if (Character.isUpperCase(c)) {
                    if (i > 0 && Character.isLowerCase(str.charAt(i - 1))) {
                        result += "_";
                    }
                    result += Character.toLowerCase(c);
                } else {
                    result += c;
                }
            }
            return result;
        }
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              String newKey = camelToSnake(entry.getKey());
              newObj[newKey] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }
        if (ctx.lite_llm?.spend_tracking != null) {
          ctx.lite_llm.spend_tracking = convertToSnakeCase(ctx.lite_llm.spend_tracking);
        }
      on_failure:
        - append:
            tag: append_script_convert_camelcase_to_snake_case_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      description: >
        Calculate event.duration from start_time and end_time in milliseconds.
      tag: calculate_event_duration
      lang: painless
      source: |
        def startTime = ctx.lite_llm?.spend_tracking?.start_time;
        def endTime = ctx.lite_llm?.spend_tracking?.end_time;

        if (startTime != null && endTime != null) {
          try {
            def startMs = ZonedDateTime.parse(startTime).toInstant().toEpochMilli();
            def endMs = ZonedDateTime.parse(endTime).toInstant().toEpochMilli();
            ctx.event.duration = endMs - startMs;
          } catch(Exception e) {
            ctx.event.duration = 0;
          }
        }
      on_failure:
        - append:
            tag: append_calculate_event_duration_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_api_into_event_category
      value: api
  - append:
      field: event.type
      tag: append_access_into_event_type
      value: access
  - set:
      field: gen_ai.agent.id
      tag: set_gen_ai_agent_id_from_spend_tracking_agent_id
      copy_from: lite_llm.spend_tracking.agent_id
      ignore_empty_value: true
  - set:
      field: url.full
      tag: set_url_full_from_spend_tracking_api_base
      copy_from: lite_llm.spend_tracking.api_base
      ignore_empty_value: true
  - set:
      field: gen_ai.operation.name
      tag: set_gen_ai_operation_name_from_spend_tracking_call_type
      copy_from: lite_llm.spend_tracking.call_type
      ignore_empty_value: true
  - date:
      field: lite_llm.spend_tracking.completion_start_time
      tag: date_completion_start_time
      if: ctx.lite_llm?.spend_tracking?.completion_start_time != null && ctx.lite_llm.spend_tracking.completion_start_time != ''
      target_field: lite_llm.spend_tracking.completion_start_time
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_completion_start_time_on_date_failure
            field: lite_llm.spend_tracking.completion_start_time
            ignore_missing: true
        - append:
            tag: append_date_completion_start_time_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.completion_tokens
      tag: convert_completion_tokens_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_completion_tokens_on_convert_failure
            field: lite_llm.spend_tracking.completion_tokens
            ignore_missing: true
        - append:
            tag: append_convert_completion_tokens_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: gen_ai.system
      tag: set_gen_ai_system_from_spend_tracking_custom_llm_provider
      copy_from: lite_llm.spend_tracking.custom_llm_provider
      ignore_empty_value: true
  - date:
      field: lite_llm.spend_tracking.end_time
      tag: date_end_time
      if: ctx.lite_llm?.spend_tracking?.end_time != null && ctx.lite_llm.spend_tracking.end_time != ''
      target_field: lite_llm.spend_tracking.end_time
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_end_time_on_date_failure
            field: lite_llm.spend_tracking.end_time
            ignore_missing: true
        - append:
            tag: append_date_end_time_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.end
      tag: set_event_end_from_spend_tracking_end_time
      copy_from: lite_llm.spend_tracking.end_time
      ignore_empty_value: true
  - set:
      field: user.target.id
      tag: set_user_target_id_from_spend_tracking_end_user
      copy_from: lite_llm.spend_tracking.end_user
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_spend_tracking_end_user_into_related_user
      if: ctx.lite_llm?.spend_tracking?.end_user != null
      value: '{{{lite_llm.spend_tracking.end_user}}}'
      allow_duplicates: false
  - set:
      field: gen_ai.response.id
      tag: set_gen_ai_response_id_from_spend_tracking_id
      copy_from: lite_llm.spend_tracking.id
      ignore_empty_value: true
  - set:
      field: gen_ai.tool.name
      tag: set_gen_ai_tool_name_from_spend_tracking_mcp_namespaced_tool_name
      copy_from: lite_llm.spend_tracking.mcp_namespaced_tool_name
      ignore_empty_value: true
  - convert:
      field: lite_llm.spend_tracking.metadata.attempted_retries
      tag: convert_metadata_attempted_retries_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_metadata_attempted_retries_on_convert_failure
            field: lite_llm.spend_tracking.metadata.attempted_retries
            ignore_missing: true
        - append:
            tag: append_convert_metadata_attempted_retries_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: error.type
      tag: set_error_type_from_spend_tracking_metadata_error_information_error_class
      copy_from: lite_llm.spend_tracking.metadata.error_information.error_class
      ignore_empty_value: true
  - set:
      field: error.stack_trace
      tag: set_error_stack_trace_from_spend_tracking_metadata_error_information_traceback
      copy_from: lite_llm.spend_tracking.metadata.error_information.traceback
      ignore_empty_value: true
  - foreach:
      field: lite_llm.spend_tracking.metadata.guardrail_information
      tag: foreach_metadata_guardrail_information_guardrail_name
      if: ctx.lite_llm?.spend_tracking?.metadata?.guardrail_information instanceof List
      processor:
        append:
          field: rule.name
          tag: append_metadata_guardrail_information_guardrail_name_into_rule_name
          value: '{{{_ingest._value.guardrail_name}}}'
          allow_duplicates: false
  - foreach:
      field: lite_llm.spend_tracking.metadata.guardrail_information
      tag: foreach_metadata_guardrail_information_guardrail_response_flagged
      if: ctx.lite_llm?.spend_tracking?.metadata?.guardrail_information instanceof List
      processor:
        convert:
          field: _ingest._value.guardrail_response.flagged
          tag: convert_metadata_guardrail_information_guardrail_response_flagged_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                tag: remove_guardrail_response_flagged_on_convert_failure
                field:
                  - _ingest._value.guardrail_response.flagged
                ignore_missing: true
            - append:
                tag: append_convert_guardrail_response_flagged_error
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.metadata.litellm_overhead_time_ms
      tag: convert_metadata_litellm_overhead_time_ms_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_metadata_litellm_overhead_time_ms_on_convert_failure
            field: lite_llm.spend_tracking.metadata.litellm_overhead_time_ms
            ignore_missing: true
        - append:
            tag: append_convert_metadata_litellm_overhead_time_ms_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.metadata.max_retries
      tag: convert_metadata_max_retries_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_metadata_max_retries_on_convert_failure
            field: lite_llm.spend_tracking.metadata.max_retries
            ignore_missing: true
        - append:
            tag: append_convert_metadata_max_retries_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.metadata.requester_ip_address
      tag: convert_metadata_requester_ip_address_to_ip
      if: ctx.lite_llm?.spend_tracking?.metadata?.requester_ip_address != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_metadata_requester_ip_address_on_convert_failure
            field: lite_llm.spend_tracking.metadata.requester_ip_address
            ignore_missing: true
        - append:
            tag: append_convert_metadata_requester_ip_address_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: group.name
      tag: set_group_name_from_spend_tracking_metadata_user_api_key_team_alias
      copy_from: lite_llm.spend_tracking.metadata.user_api_key_team_alias
      ignore_empty_value: true
  - set:
      field: user.email
      tag: set_user_email_from_spend_tracking_metadata_user_api_key_user_id
      copy_from: lite_llm.spend_tracking.metadata.user_api_key_user_id
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_spend_tracking_metadata_user_api_key_user_id_into_related_user
      if: ctx.lite_llm?.spend_tracking?.metadata?.user_api_key_user_id != null
      value: '{{{lite_llm.spend_tracking.metadata.user_api_key_user_id}}}'
      allow_duplicates: false
  - dissect:
      tag: dissect_extract_domain_from_email
      description: Extract domain from user email address.
      field: user.email
      pattern: '%{}@%{user.domain}'
      if: ctx.user?.email != null && ctx.user.email.contains('@')
  - set:
      field: gen_ai.request.model
      tag: set_gen_ai_request_model_from_spend_tracking_model
      copy_from: lite_llm.spend_tracking.model
      ignore_empty_value: true
  - set:
      field: organization.id
      tag: set_organization_id_from_spend_tracking_organization_id
      copy_from: lite_llm.spend_tracking.organization_id
      ignore_empty_value: true
  - convert:
      field: lite_llm.spend_tracking.prompt_tokens
      tag: convert_prompt_tokens_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_prompt_tokens_on_convert_failure
            field: lite_llm.spend_tracking.prompt_tokens
            ignore_missing: true
        - append:
            tag: append_convert_prompt_tokens_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.request_duration_ms
      tag: convert_request_duration_ms_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_request_duration_ms_on_convert_failure
            field: lite_llm.spend_tracking.request_duration_ms
            ignore_missing: true
        - append:
            tag: append_convert_request_duration_ms_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.id
      tag: set_event_id_from_spend_tracking_request_id
      copy_from: lite_llm.spend_tracking.request_id
      ignore_empty_value: true
  - foreach:
      field: lite_llm.spend_tracking.request_tags
      tag: foreach_request_tags
      if: ctx.lite_llm?.spend_tracking?.request_tags instanceof List
      processor:
        append:
          field: tags
          tag: append_request_tags_into_tags
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - convert:
      field: lite_llm.spend_tracking.requester_ip_address
      tag: convert_requester_ip_address_to_ip
      if: ctx.lite_llm?.spend_tracking?.requester_ip_address != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_requester_ip_address_on_convert_failure
            field: lite_llm.spend_tracking.requester_ip_address
            ignore_missing: true
        - append:
            tag: append_convert_requester_ip_address_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: client.ip
      tag: set_client_ip_from_spend_tracking_requester_ip_address
      copy_from: lite_llm.spend_tracking.requester_ip_address
      ignore_empty_value: true
  - append:
      field: related.ip
      tag: append_spend_tracking_requester_ip_address_into_related_ip
      if: ctx.lite_llm?.spend_tracking?.requester_ip_address != null
      value: '{{{lite_llm.spend_tracking.requester_ip_address}}}'
      allow_duplicates: false
  - convert:
      field: lite_llm.spend_tracking.response_cost
      tag: convert_response_cost_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_response_cost_on_convert_failure
            field: lite_llm.spend_tracking.response_cost
            ignore_missing: true
        - append:
            tag: append_convert_response_cost_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.response_time
      tag: convert_response_time_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_response_time_on_convert_failure
            field: lite_llm.spend_tracking.response_time
            ignore_missing: true
        - append:
            tag: append_convert_response_time_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.spend_tracking.spend
      tag: convert_spend_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_spend_on_convert_failure
            field: lite_llm.spend_tracking.spend
            ignore_missing: true
        - append:
            tag: append_convert_spend_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: lite_llm.spend_tracking.start_time
      tag: date_start_time
      if: ctx.lite_llm?.spend_tracking?.start_time != null && ctx.lite_llm.spend_tracking.start_time != ''
      target_field: lite_llm.spend_tracking.start_time
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_start_time_on_date_failure
            field: lite_llm.spend_tracking.start_time
            ignore_missing: true
        - append:
            tag: append_date_start_time_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_spend_tracking_start_time
      copy_from: lite_llm.spend_tracking.start_time
      ignore_empty_value: true
  - set:
      field: event.start
      tag: set_event_start_from_spend_tracking_start_time
      copy_from: lite_llm.spend_tracking.start_time
      ignore_empty_value: true
  - set:
      field: event.outcome
      tag: set_event_outcome_from_spend_tracking_status
      copy_from: lite_llm.spend_tracking.status
      ignore_empty_value: true
  - set:
      field: group.id
      tag: set_group_id_from_spend_tracking_team_id
      copy_from: lite_llm.spend_tracking.team_id
      ignore_empty_value: true
  - convert:
      field: lite_llm.spend_tracking.total_tokens
      tag: convert_total_tokens_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_total_tokens_on_convert_failure
            field: lite_llm.spend_tracking.total_tokens
            ignore_missing: true
        - append:
            tag: append_convert_total_tokens_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: trace.id
      tag: set_trace_id_from_spend_tracking_trace_id
      copy_from: lite_llm.spend_tracking.trace_id
      ignore_empty_value: true
  - set:
      field: user.id
      tag: set_user_id_from_spend_tracking_user
      copy_from: lite_llm.spend_tracking.user
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_spend_tracking_user_into_related_user
      if: ctx.lite_llm?.spend_tracking?.user != null
      value: '{{{lite_llm.spend_tracking.user}}}'
      allow_duplicates: false
  - append:
      field: related.hash
      tag: append_spend_tracking_user_api_key_hash_into_related_hash
      if: ctx.lite_llm?.spend_tracking?.user_api_key_hash != null
      value: '{{{lite_llm.spend_tracking.user_api_key_hash}}}'
      allow_duplicates: false
  - foreach:
      field: lite_llm.spend_tracking.metadata.guardrail_information
      tag: foreach_metadata_guardrail_information
      if: ctx.lite_llm?.spend_tracking?.metadata?.guardrail_information instanceof List
      processor:
        remove:
          field:
            - _ingest._value.guardrail_name
          tag: remove_custom_duplicate_fields_from_metadata_guardrail_information
          if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
          ignore_missing: true
  - remove:
      field:
        - lite_llm.spend_tracking.agent_id
        - lite_llm.spend_tracking.api_base
        - lite_llm.spend_tracking.call_type
        - lite_llm.spend_tracking.custom_llm_provider
        - lite_llm.spend_tracking.end_time
        - lite_llm.spend_tracking.end_user
        - lite_llm.spend_tracking.id
        - lite_llm.spend_tracking.mcp_namespaced_tool_name
        - lite_llm.spend_tracking.metadata.error_information.error_class
        - lite_llm.spend_tracking.metadata.error_information.traceback
        - lite_llm.spend_tracking.metadata.user_api_key_team_alias
        - lite_llm.spend_tracking.metadata.user_api_key_user_id
        - lite_llm.spend_tracking.model
        - lite_llm.spend_tracking.organization_id
        - lite_llm.spend_tracking.request_id
        - lite_llm.spend_tracking.request_tags
        - lite_llm.spend_tracking.requester_ip_address
        - lite_llm.spend_tracking.start_time
        - lite_llm.spend_tracking.status
        - lite_llm.spend_tracking.team_id
        - lite_llm.spend_tracking.trace_id
        - lite_llm.spend_tracking.user
      tag: remove_fields_mapped_to_ecs
      ignore_missing: true
  - script:
      tag: remove_null_values
      lang: painless
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
      on_failure:
