- name: lite_llm
  type: group
  fields:
    - name: spend_tracking
      type: group
      fields:
        - name: api_key
          type: keyword
          description: Serialized API-key identifier stored with the spend log; LiteLLM hashes real keys before persistence.
        - name: cache_hit
          type: keyword
          description: String representation of whether the response was served from cache.
        - name: cache_key
          type: keyword
          description: LiteLLM cache key or cache-disabled sentinel for the request.
        - name: completion_start_time
          type: date
          description: Timestamp when completion generation or the first streamed token began.
        - name: completion_tokens
          type: long
          description: Number of output or completion tokens generated by the call.
        - name: messages
          type: keyword
          description: Serialized request messages sent to the model; LiteLLM may also emit list or object forms.
        - name: metadata
          type: group
          fields:
            - name: additional_usage_values
              type: flattened
              description: Provider-specific usage metrics outside the standard token counters.
            - name: applied_guardrails
              type: keyword
              description: Names of guardrails applied to the request.
            - name: attempted_retries
              type: long
              description: Number of retries attempted for the request.
            - name: batch_models
              type: keyword
              description: Models used for batch cost calculation.
            - name: cold_storage_object_key
              type: keyword
              description: S3 or GCS object key used to retrieve archived request data.
            - name: cost_breakdown
              type: keyword
              description: Detailed input, output, tool, cache, reasoning, and total cost breakdown.
            - name: error_information
              type: group
              fields:
                - name: error_code
                  type: keyword
                  description: Error code reported for the failed request.
                - name: error_message
                  type: text
                  description: Human-readable message for the failed request.
                - name: error_rate_limit_category
                  type: keyword
                  description: Source category of a rate-limit failure, such as provider or LiteLLM rate limiting.
                - name: error_rate_limit_type
                  type: keyword
                  description: Rate-limit dimension exceeded, such as requests, tokens, concurrency, budget, or iterations.
                - name: llm_provider
                  type: keyword
                  description: LLM provider associated with the error.
            - name: eval_information
              type: flattened
              description: 'Inferred: Evaluation metadata associated with the request.'
            - name: guardrail_information
              type: group
              fields:
                - name: guardrail_mode
                  type: keyword
                  description: Guardrail execution hook or mode; the observed value is a scalar, while LiteLLM also permits list or object forms.
                - name: guardrail_response
                  type: group
                  fields:
                    - name: detected_entities
                      type: keyword
                      description: 'Inferred: Entity categories detected by the PII guardrail.'
                    - name: flagged
                      type: boolean
                      description: 'Inferred: Whether the guardrail response flagged the request content.'
                - name: guardrail_status
                  type: keyword
                  description: Guardrail execution status; current LiteLLM definitions use success, guardrail_intervened, guardrail_failed_to_respond, or not_run, while this sample also contains blocked.
            - name: litellm_overhead_time_ms
              type: double
              description: LiteLLM processing overhead in milliseconds.
            - name: max_retries
              type: long
              description: Maximum number of retries configured for the request.
            - name: mcp_tool_call_metadata
              type: keyword
              description: MCP tool-call arguments, result, server identity, and cost metadata.
            - name: model_map_information
              type: keyword
              description: LiteLLM model-map key and resolved model information.
            - name: proxy_server_request
              type: keyword
              description: 'Inferred: Serialized proxy request information retained with the spend log.'
            - name: requester_ip_address
              type: ip
              description: Requester IP address copied into LiteLLM metadata.
            - name: spend_logs_metadata
              type: flattened
              description: Custom key-value metadata supplied for spend logging.
            - name: status
              type: keyword
              description: Status copied into LiteLLM spend metadata.
            - name: usage_object
              type: flattened
              description: Raw usage object returned by the LLM provider.
            - name: user_api_key
              type: keyword
              description: API-key identifier retained in spend metadata.
            - name: user_api_key_alias
              type: keyword
              description: Human-readable alias of the LiteLLM virtual API key.
            - name: user_api_key_org_id
              type: keyword
              description: Organization identifier associated with the API key.
            - name: user_api_key_project_alias
              type: keyword
              description: Human-readable alias of the project associated with the API key.
            - name: user_api_key_project_id
              type: keyword
              description: Identifier of the project associated with the API key.
            - name: user_api_key_team_id
              type: keyword
              description: Team identifier associated with the API key.
            - name: vector_store_request_metadata
              type: keyword
              description: Vector-store request metadata associated with the LLM call.
        - name: model_group
          type: keyword
          description: LiteLLM routing model group used for the request.
        - name: model_id
          type: keyword
          description: Identifier of the LiteLLM model deployment used for the call.
        - name: prompt_tokens
          type: long
          description: Number of input or prompt tokens used by the call.
        - name: request_duration_ms
          type: long
          description: Total request duration stored in milliseconds.
        - name: response
          type: keyword
          description: Model response retained in the spend log; LiteLLM may also emit list or object forms.
        - name: response_cost
          type: double
          description: Calculated response cost in US dollars.
        - name: response_time
          type: double
          description: Total response time in seconds; for streaming calls this may represent time to first token.
        - name: session_id
          type: keyword
          description: Identifier used to group related LiteLLM requests into one session.
        - name: spend
          type: double
          description: Spend charged for the request in US dollars.
        - name: total_tokens
          type: long
          description: Total number of input and output tokens used by the call.
        - name: user_api_key_hash
          type: keyword
          description: Hash of the LiteLLM virtual API key used for the request.
