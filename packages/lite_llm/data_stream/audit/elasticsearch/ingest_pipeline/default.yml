---
description: Pipeline for processing LiteLLM audit logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.4.0
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - remove:
      field:
        - organization
        - division
        - team
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      ignore_missing: true
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
  - rename:
      field: message
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
  - remove:
      field:
        - message
      tag: remove_message
      if: ctx.event?.original != null
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
  - json:
      field: event.original
      tag: json_event_original
      target_field: lite_llm.audit
  - fingerprint:
      tag: fingerprint_with_id
      fields:
        - lite_llm.audit.id
      target_field: _id
      ignore_missing: true
  - script:
      description: >
        Convert field names from camelCase to snake_case recursively.
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      source: |-
        String camelToSnake(String str) {
            def result = "";
            for (int i = 0; i < str.length(); i++) {
                char c = str.charAt(i);
                if (Character.isUpperCase(c)) {
                    if (i > 0 && Character.isLowerCase(str.charAt(i - 1))) {
                        result += "_";
                    }
                    result += Character.toLowerCase(c);
                } else {
                    result += c;
                }
            }
            return result;
        }
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              String newKey = camelToSnake(entry.getKey());
              newObj[newKey] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }
        if (ctx.lite_llm?.audit != null) {
          ctx.lite_llm.audit = convertToSnakeCase(ctx.lite_llm.audit);
        }
      on_failure:
        - append:
            tag: append_script_convert_camelcase_to_snake_case_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_configuration_into_event_category
      value: configuration
  - append:
      field: event.type
      tag: append_change_into_event_type
      value: change
  - set:
      field: event.id
      tag: set_event_id_from_audit_id
      copy_from: lite_llm.audit.id
      ignore_empty_value: true
  - set:
      field: event.action
      tag: set_event_action_from_audit_action
      copy_from: lite_llm.audit.action
      ignore_empty_value: true
  - date:
      field: lite_llm.audit.updated_at
      tag: date_root_updated_at
      if: ctx.lite_llm?.audit?.updated_at != null && ctx.lite_llm.audit.updated_at != ''
      target_field: lite_llm.audit.updated_at
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_date_root_updated_at_on_failure
            field: lite_llm.audit.updated_at
            ignore_missing: true
        - append:
            tag: append_date_root_updated_at_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_timestamp_from_updated_at
      copy_from: lite_llm.audit.updated_at
      ignore_empty_value: true
  - date:
      field: lite_llm.audit.before_value.created_at
      tag: date_before_value_created_at
      if: ctx.lite_llm?.audit?.before_value?.created_at != null && ctx.lite_llm.audit.before_value.created_at != ''
      target_field: lite_llm.audit.before_value.created_at
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_date_before_value_created_at_on_failure
            field: lite_llm.audit.before_value.created_at
            ignore_missing: true
        - append:
            tag: append_date_before_value_created_at_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: lite_llm.audit.before_value.updated_at
      tag: date_before_value_updated_at
      if: ctx.lite_llm?.audit?.before_value?.updated_at != null && ctx.lite_llm.audit.before_value.updated_at != ''
      target_field: lite_llm.audit.before_value.updated_at
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_date_before_value_updated_at_on_failure
            field: lite_llm.audit.before_value.updated_at
            ignore_missing: true
        - append:
            tag: append_date_before_value_updated_at_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: lite_llm.audit.updated_values.created_at
      tag: date_updated_values_created_at
      if: ctx.lite_llm?.audit?.updated_values?.created_at != null && ctx.lite_llm.audit.updated_values.created_at != ''
      target_field: lite_llm.audit.updated_values.created_at
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_date_updated_values_created_at_on_failure
            field: lite_llm.audit.updated_values.created_at
            ignore_missing: true
        - append:
            tag: append_date_updated_values_created_at_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: lite_llm.audit.updated_values.updated_at
      tag: date_updated_values_updated_at
      if: ctx.lite_llm?.audit?.updated_values?.updated_at != null && ctx.lite_llm.audit.updated_values.updated_at != ''
      target_field: lite_llm.audit.updated_values.updated_at
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_date_updated_values_updated_at_on_failure
            field: lite_llm.audit.updated_values.updated_at
            ignore_missing: true
        - append:
            tag: append_date_updated_values_updated_at_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.before_value.max_budget
      tag: convert_before_value_max_budget_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_before_value_max_budget_on_failure
            field: lite_llm.audit.before_value.max_budget
            ignore_missing: true
        - append:
            tag: append_convert_before_value_max_budget_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.before_value.rotation_count
      tag: convert_before_value_rotation_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_before_value_rotation_count_on_failure
            field: lite_llm.audit.before_value.rotation_count
            ignore_missing: true
        - append:
            tag: append_convert_before_value_rotation_count_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.before_value.soft_budget_cooldown
      tag: convert_before_value_soft_budget_cooldown_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_before_value_soft_budget_cooldown_on_failure
            field: lite_llm.audit.before_value.soft_budget_cooldown
            ignore_missing: true
        - append:
            tag: append_convert_before_value_soft_budget_cooldown_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.before_value.auto_rotate
      tag: convert_before_value_auto_rotate_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_before_value_auto_rotate_on_failure
            field: lite_llm.audit.before_value.auto_rotate
            ignore_missing: true
        - append:
            tag: append_convert_before_value_auto_rotate_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.before_value.spend
      tag: convert_before_value_spend_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_before_value_spend_on_failure
            field: lite_llm.audit.before_value.spend
            ignore_missing: true
        - append:
            tag: append_convert_before_value_spend_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.updated_values.max_budget
      tag: convert_updated_values_max_budget_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_updated_values_max_budget_on_failure
            field: lite_llm.audit.updated_values.max_budget
            ignore_missing: true
        - append:
            tag: append_convert_updated_values_max_budget_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.updated_values.rotation_count
      tag: convert_updated_values_rotation_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_updated_values_rotation_count_on_failure
            field: lite_llm.audit.updated_values.rotation_count
            ignore_missing: true
        - append:
            tag: append_convert_updated_values_rotation_count_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.updated_values.soft_budget_cooldown
      tag: convert_updated_values_soft_budget_cooldown_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_updated_values_soft_budget_cooldown_on_failure
            field: lite_llm.audit.updated_values.soft_budget_cooldown
            ignore_missing: true
        - append:
            tag: append_convert_updated_values_soft_budget_cooldown_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.updated_values.auto_rotate
      tag: convert_updated_values_auto_rotate_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_updated_values_auto_rotate_on_failure
            field: lite_llm.audit.updated_values.auto_rotate
            ignore_missing: true
        - append:
            tag: append_convert_updated_values_auto_rotate_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: lite_llm.audit.updated_values.spend
      tag: convert_updated_values_spend_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_convert_updated_values_spend_on_failure
            field: lite_llm.audit.updated_values.spend
            ignore_missing: true
        - append:
            tag: append_convert_updated_values_spend_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: user.email
      tag: set_user_email_from_changed_by
      copy_from: lite_llm.audit.changed_by
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_user_email_into_related_user
      if: ctx.lite_llm?.audit?.changed_by != null
      value: '{{{lite_llm.audit.changed_by}}}'
      allow_duplicates: false
  - dissect:
      tag: dissect_extract_domain_from_email
      description: Extract domain from user email address.
      field: user.email
      pattern: '%{user_part}@%{domain}'
      ignore_missing: true
      on_failure:
        - remove:
            field: user_part
            ignore_missing: true
  - rename:
      tag: rename_domain_to_user_domain
      field: domain
      target_field: user.domain
      ignore_missing: true
  - append:
      tag: append_domain_to_related_user
      field: related.user
      value: '{{{user.domain}}}'
      if: ctx.user?.domain != null
      allow_duplicates: false
  - remove:
      tag: remove_user_part_field
      field: user_part
      ignore_missing: true
  - set:
      field: event.created
      tag: set_event_created_from_updated_values
      copy_from: lite_llm.audit.updated_values.created_at
      ignore_empty_value: true
  - set:
      field: event.created
      tag: set_event_created_from_before_value_fallback
      copy_from: lite_llm.audit.before_value.created_at
      if: ctx.event?.created == null && ctx.lite_llm?.audit?.before_value?.created_at != null
      ignore_empty_value: true
  - set:
      field: user.id
      tag: set_user_id_from_updated_values
      copy_from: lite_llm.audit.updated_values.user_id
      ignore_empty_value: true
  - set:
      field: user.id
      tag: set_user_id_from_before_value_fallback
      copy_from: lite_llm.audit.before_value.user_id
      if: ctx.user?.id == null && ctx.lite_llm?.audit?.before_value?.user_id != null
      ignore_empty_value: true
  - remove:
      field:
        - lite_llm.audit.id
        - lite_llm.audit.action
        - lite_llm.audit.changed_by
        - lite_llm.audit.updated_at
      tag: remove_fields_mapped_to_ecs
      ignore_missing: true
  - append:
      field: related.user
      tag: append_user_id_to_related_user
      value: '{{{user.id}}}'
      if: ctx.user?.id != null
      allow_duplicates: false
  - script:
      tag: remove_null_values
      lang: painless
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
      on_failure:
        - append:
            tag: append_remove_null_values_error
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      if: ctx.error?.message != null
      value: pipeline_error
  - append:
      field: tags
      tag: append_preserve_original_event_on_error
      if: ctx.error?.message != null
      value: preserve_original_event
      allow_duplicates: false
on_failure:
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_pipeline_failure_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
