---
description: Pipeline for processing user logs.
processors:
  - convert:
      field: axonius.identity.account_disabled
      tag: convert_account_disabled_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.account_disabled
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.identity.associated_devices
      tag: foreach_associated_devices_device_id
      if: ctx.axonius?.identity?.associated_devices instanceof List
      processor:
        foreach:
          field: _ingest._value.device_id
          tag: foreach_associated_devices_device_id
          ignore_missing: true
          processor:
            append:
              field: device.id
              tag: append_associated_devices_device_id_into_device_id
              value: '{{{_ingest._value}}}'
              allow_duplicates: false
  - foreach:
      field: axonius.identity.associated_devices
      tag: foreach_associated_devices_device_model
      if: ctx.axonius?.identity?.associated_devices instanceof List
      processor:
        foreach:
          field: _ingest._value.device_model
          tag: foreach_associated_devices_device_model
          ignore_missing: true
          processor:
            append:
              field: device.model.name
              tag: append_associated_devices_device_model_into_device_model_name
              value: '{{{_ingest._value}}}'
              allow_duplicates: false
  - foreach:
      field: axonius.identity.associated_devices
      tag: foreach_associated_devices_device_serial
      if: ctx.axonius?.identity?.associated_devices instanceof List
      processor:
        foreach:
          field: _ingest._value.device_serial
          tag: foreach_associated_devices_device_serial
          ignore_missing: true
          processor:
            append:
              field: device.serial_number
              tag: append_associated_devices_device_serial_into_device_serial_number
              value: '{{{_ingest._value}}}'
              allow_duplicates: false
  - foreach:
      field: axonius.identity.associated_devices
      tag: foreach_associated_devices_device_preferred_mac_address
      if: ctx.axonius?.identity?.associated_devices instanceof List
      processor:
        foreach:
          field: _ingest._value.device_preferred_mac_address
          tag: foreach_associated_devices_device_preferred_mac_address
          ignore_missing: true
          processor:
            gsub:
              field: _ingest._value
              tag: gsub_device_preferred_mac_address
              pattern: ':'
              replacement: '-'
              ignore_missing: true
              on_failure:
                - append:
                    field: error.message
                    value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.identity.associated_devices
      tag: foreach_associated_devices_device_preferred_mac_address
      if: ctx.axonius?.identity?.associated_devices instanceof List
      processor:
        foreach:
          field: _ingest._value.device_preferred_mac_address
          tag: foreach_associated_devices_device_preferred_mac_address
          ignore_missing: true
          processor:
            uppercase:
              field: _ingest._value
              tag: uppercase_device_preferred_mac_address
              ignore_missing: true
